version: '3.8'
services:
  auth-service:
    build: .
    working_dir: /app/apps/auth-service
    command: npm run start:auth-service
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=dev
      - JWT_SECRET=revest
    depends_on:
      - mongodb
      - postgres

  order-service:
    build: .
    working_dir: /app/apps/order-service
    command: npm run start:dev:order-service
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=dev
      - JWT_SECRET=revest
      - PRODUCT_SERVICE_API_KEY=my-product-secret-key
    depends_on:
      - mongodb
      - postgres

  product-service:
    build: .
    working_dir: /app/apps/product-service
    command: npm run start:product-service
    ports:
      - '3003:3003'
    environment:
      - NODE_ENV=dev
      - MONGO_URI=mongodb://admin:admin@mongodb:27017/product_db?authSource=admin
      - JWT_SECRET=revest
      - PRODUCT_SERVICE_API_KEY=my-product-secret-key
    depends_on:
      - mongodb
      - postgres

  mongodb:
    image: mongo:6
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    # command: ["mongod", "--quiet"]
    volumes:
      - mongo-data:/data/db


  

  postgres:
    image: postgres:16
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=ecommerce
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mongo-data:
  postgres-data:

# I had plan for implementing caching for product details in the order service using Redis, 
# but I decided to keep it simple for now and removed it from the current implementation.
